# Central config for the RLHF pipeline.
# Swap `base_model` to scale up once the pipeline is validated end-to-end.

# --- Model ---
# Tiny/default: good for a first CPU/GPU smoke test, matches TRL's own example default.
base_model: "EleutherAI/pythia-160m"

# For a real prototype on a GPU box, swap to something like one of:
#   "Qwen/Qwen2.5-1.5B-Instruct"
#   "meta-llama/Llama-3.2-1B-Instruct"
#   "EleutherAI/pythia-1.4b-deduped"
# Bigger models need `peft` LoRA (see configs below) to fit on a single consumer GPU.

# --- Paths (outputs of each stage feed the next) ---
sft_output_dir: "outputs/sft_model"
reward_output_dir: "outputs/reward_model"
ppo_output_dir: "outputs/ppo_model"

# --- Data ---
sft_data_path: "data/sft_data.jsonl"          # {"prompt": ..., "response": ...}
preference_data_path: "data/preference_data.jsonl"  # {"prompt": ..., "chosen": ..., "rejected": ...}
ppo_prompts_path: "data/ppo_prompts.jsonl"    # {"prompt": ...}

# --- SFT stage ---
sft:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-5
  max_seq_length: 512

# --- Reward model stage ---
reward:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  learning_rate: 1.0e-5
  max_length: 512

# --- PPO stage ---
ppo:
  learning_rate: 3.0e-6
  num_ppo_epochs: 4
  per_device_train_batch_size: 4
  mini_batch_size: 1
  total_episodes: 200          # bump way up for a real run (e.g. 10_000+)
  response_length: 64
  kl_coef: 0.05
  missing_eos_penalty: 1.0

# --- LoRA (optional, recommended once you move to a bigger base_model) ---
use_lora: false
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "v_proj"]   # adjust per model architecture
